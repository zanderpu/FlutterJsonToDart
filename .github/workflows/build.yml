name: Build Plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.1.4)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Update Version
        if: ${{ github.event.inputs.version != '' }}
        run: |
          echo "pluginVersion = ${{ github.event.inputs.version }}" >> gradle.properties

      - name: Build Plugin
        run: ./gradlew buildPlugin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-package
          path: build/distributions/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.version != '' }}

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-package
          path: output

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: FlutterJsonToDart v${{ github.event.inputs.version }}
          files: output/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
